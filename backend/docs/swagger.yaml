  contact: {}
  description: ITDB IT 资产管理系统后端 API 文档。除登录和健康检查外，接口默认需要 Bearer Token。
  title: ITDB API
  version: 1.0.0
paths:
  /api/agents:
    get:
      parameters:
      - description: 搜索关键词
        in: query
        name: search
        type: string
      - description: 返回数量，-1 表示全部
        in: query
        name: limit
        type: integer
      - description: 偏移量
        in: query
        name: offset
        type: integer
